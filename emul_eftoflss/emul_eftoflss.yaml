path: null
extra_args:
  # Sets interpolation density of points in both k and z
  #   This interpolation uses linear interpolation and constant extrapolation
  #   Whereas CAMB will use cubic interpolation
  accuracyboost: 1
  # Optional non-linear reference reference boost
  #   Currently we implemented euclidemu2, but others will be added
  reference_nonlin: 'none'
  # The k-mode in which to fit the counterterms to the reference spectrum
  k_fit: 0.5 
  # k_uv: where to truncate the EFT and replace with a 
  #   rescaled reference spectrum
  #   the reference spectrum is the linear spectrum unless
  #   reference_nonlin != 'none', in which case the reference 
  #   is the nonlin_reference
  k_uv: 0.5
  # The file containing the pca coordinate transform for the 
  #   counterterm spline coefficients
  eft_pca_file: 'none'
  # Option to run on the GPU by setting to 'cuda' or 'cuda:(gpu index)'
  device: 'cpu'

